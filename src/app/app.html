<tui-tabs 
class="menu-tabs" 
[size]="'l'" 
style="height: 38px;">
  <a
    tuiTab
    routerLink="/clicker-page"
    routerLinkActive="tui-tab_active"
    [routerLinkActiveOptions]="{ exact: true }"
    style="margin-left: 24px;"
  >
    Clicker
  </a>
  <a
    tuiTab
    routerLink="/heroes-page"
    routerLinkActive="tui-tab_active"
  >
    Heroes
  </a>
  <span style="flex: 1 1 auto"></span>
  <div class="theme-switcher">
    <span class="theme-text">Ослепнуть -></span>
    <input
      tuiSwitch
      type="checkbox"
      [(ngModel)]="isDark"
      (ngModelChange)="changeTheme($event)"
      [showIcons]="true"
      [size]="'m'"
    />
  </div>
</tui-tabs>

<router-outlet></router-outlet>
